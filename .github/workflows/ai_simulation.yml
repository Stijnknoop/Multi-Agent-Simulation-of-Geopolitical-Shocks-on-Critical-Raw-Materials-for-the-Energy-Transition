name: Run AI Agent Simulation

# Handmatige trigger via de 'Actions' tab
on:
  workflow_dispatch:

jobs:
  run_agents:
    runs-on: ubuntu-latest

    steps:
    # 1. Haal de code uit de repository op
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Installeer Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Installeer alleen CrewAI (meer hebben de agents niet nodig)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install crewai

    # 4. Voer de AI-agents uit en koppel de geheime Gemini Key
    - name: Run AI Agent Simulation
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python src/agents.py
